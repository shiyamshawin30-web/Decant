<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fragrance Discovery | DecantLAB</title>
    <link rel="stylesheet" href="css/style.css?v=4.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .product-page { padding: 80px 5%; min-height: 100vh; background: var(--bg-white); }
        .product-container { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
        .gallery-main { width: 100%; border: 1px solid var(--border-light); border-radius: var(--card-radius); overflow: hidden; }
        .gallery-main img { width: 100%; height: 600px; object-fit: contain; padding: 40px; transition: 0.5s; }
        .gallery-main:hover img { transform: scale(1.05); }
        .product-details h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .product-details .brand { font-size: 1.1rem; color: var(--gray-mid); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .product-details .price { font-size: 2.2rem; font-weight: 900; margin: 40px 0; letter-spacing: 1px; }
        .desc { color: var(--gray-mid); line-height: 2; margin-bottom: 50px; font-size: 1.1rem; }
        
        .buy-actions { display: flex; gap: 20px; align-items: center; margin-top: 50px; }
        .whatsapp-btn { 
            flex: 1; background: #25d366; color: white; padding: 22px; 
            text-align: center; text-decoration: none; font-weight: 900; 
            text-transform: uppercase; border-radius: 8px; font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        @media (max-width: 992px) {
            .product-container { grid-template-columns: 1fr; gap: 40px; }
            .gallery-main img { height: 400px; }
            .product-details h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="nmra-bar">ALL OUR PRODUCTS ARE <strong>N.M.R.A REGISTERED</strong> ✓</div>

    <nav class="main-nav">
        <a href="index.html" class="nav-brand">Decant<span>LAB</span></a>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
        </ul>
    </nav>

    <div class="product-page">
        <div class="product-container scroll-fade" id="productDetail">
            <!-- Details injected here -->
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p class="copy-text">© DecantLAB 2026. Authentic Discovery.</p>
        </div>
    </footer>

    <script src="js/script.js?v=4.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const p = mockProducts.find(prod => prod.id === id) || mockProducts[0];
            
            const detail = document.getElementById('productDetail');
            detail.innerHTML = `
                <div class="gallery-main">
                    <img src="${p.image}" alt="${p.name}">
                </div>
                <div class="product-details">
                    <div class="brand">${p.brand}</div>
                    <h1>${p.name}</h1>
                    <div class="price">LKR ${p.price.toLocaleString()}</div>
                    <div class="desc">
                        Immerse yourself in the world of haute parfumerie with ${p.name}. 
                        Hand-selected by the experts at DecantLAB, this composition from the house of ${p.brand} 
                        represents the pinnacle of luxury and olfactory artistry.
                    </div>
                    
                    <h4 style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-size: 0.8rem;">Select Volume</h4>
                    <div class="ml-selection">
                        ${p.sizes.map((s, i) => `<button class="ml-btn ${i===1?'active':''}" onclick="selectSize(this)">${s}</button>`).join('')}
                    </div>

                    <div class="buy-actions">
                        <div class="qty-selector" style="height: 60px;">
                            <button class="qty-btn" onclick="updateQty(this, -1)" style="width: 50px; font-size: 1.2rem;">-</button>
                            <div class="qty-val" style="width: 50px; font-size: 1.2rem;">1</div>
                            <button class="qty-btn" onclick="updateQty(this, 1)" style="width: 50px; font-size: 1.2rem;">+</button>
                        </div>
                        <a href="https://wa.me/94752500097" class="whatsapp-btn"><i class="fab fa-whatsapp" style="margin-right: 10px;"></i> Order via WhatsApp</a>
                    </div>
                </div>
            `;

            // Initial fade in
            setTimeout(() => detail.classList.add('visible'), 100);
        });

        function updateQty(btn, delta) {
            const container = btn.parentElement;
            const valEl = container.querySelector('.qty-val');
            let current = parseInt(valEl.innerText);
            current = Math.max(1, current + delta);
            valEl.innerText = current;
        }
    </script>
</body>
</html>
